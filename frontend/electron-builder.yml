appId: com.knowtwin.app
productName: KnowTwin
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
win:
  target:
    - nsis
  icon: build/icon.png # 1024×1024, electron-builder generates the .ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
